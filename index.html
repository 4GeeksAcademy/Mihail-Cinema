<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovaCine Seat Manager</title>
  </head>
  <body>
    <main class="cinema-shell">
      <section class="hero-card">
        <p class="eyebrow">Cinema Operations Dashboard</p>
        <h1>NovaCine Evening Screening</h1>
        <p id="app" class="subcopy">Loading seat data...</p>
      </section>

      <section class="dashboard-grid">
        <article class="metric-card">
          <h2>Occupied</h2>
          <p id="occupied-count" class="metric-number">0</p>
        </article>
        <article class="metric-card">
          <h2>Available</h2>
          <p id="available-count" class="metric-number">0</p>
        </article>
        <article class="metric-card message-card">
          <h2>System Message</h2>
          <p id="status-message">Select any available seat to reserve it.</p>
          <p id="adjacent-result" class="adjacent-message"></p>
        </article>
      </section>

      <section class="legend-row" aria-label="Seat legend">
        <span class="legend-item"><i class="legend-dot available"></i> Available (L)</span>
        <span class="legend-item"><i class="legend-dot occupied"></i> Occupied (X)</span>
      </section>

      <section class="controls-row">
        <button id="find-adjacent-btn" type="button">Find Adjacent Seats</button>
        <button id="reserve-adjacent-btn" type="button">Reserve Suggested Pair</button>
        <button id="reset-room-btn" type="button" class="ghost">Reset Room</button>
      </section>

      <section class="seating-card" aria-label="Cinema seating layout">
        <div class="screen">SCREEN</div>
        <div id="seat-grid" class="seat-grid"></div>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
